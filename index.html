<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milk Tea Demo</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    .container{
      max-width:400px;
      margin:50px auto;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#ff9800;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:gray;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#ff9800;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-bottom:10px;
    }

    button:hover{
      background:#e68900;
    }

    .register{
      background:#4caf50;
    }

    .register:hover{
      background:#3d9442;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Milk Tea Demo</h1>

    <p>Wonderful Pineapple Point System</p>

    <input type="email" placeholder="Email">

    <input type="password" placeholder="Password">

    <button>Login</button>

    <button class="register">Register Member</button>

  </div>

</body>
</html>
