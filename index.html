<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milk Tea Demo</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    .container{
      max-width:400px;
      margin:50px auto;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#ff9800;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:gray;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#ff9800;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-bottom:10px;
    }

    button:hover{
      background:#e68900;
    }

    .register{
      background:#4caf50;
    }

    .register:hover{
      background:#3d9442;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Milk Tea Demo</h1>

    <p>Wonderful Pineapple Point System</p>

    <input type="email" id="loginEmail" placeholder="Email">

    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="login()">Login</button>

    <button class="register" onclick="registerMember()">Register Member</button>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmjVKWl__VmXM5b8daTlyq3sUMAQqSQV0",
      authDomain: "milk-tea-demo.firebaseapp.com",
      projectId: "milk-tea-demo",
      storageBucket: "milk-tea-demo.firebasestorage.app",
      messagingSenderId: "501059382083",
      appId: "1:501059382083:web:b0742f7502b40de2485df6"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    window.registerMember = async function(){

      let name = prompt("Enter Your Name");
      let phone = prompt("Enter Your Phone Number");
      let email = prompt("Enter Your Email");
      let password = prompt("Create Password");

      if(!name || !phone || !email || !password){
        alert("Please fill all information");
        return;
      }

      await setDoc(doc(db, "members", email), {

        name:name,
        phone:phone,
        email:email,
        password:password,
        points:0

      });

      alert("Member Registered Successfully!");

    }

    window.login = async function(){

      let email = document.getElementById("loginEmail").value;

      let password = document.getElementById("loginPassword").value;

      const docRef = doc(db, "members", email);

      const docSnap = await getDoc(docRef);

      if(docSnap.exists()){

        let member = docSnap.data();

        if(member.password === password){

          alert(
            "Welcome " +
            member.name +
            "\nPoints: " +
            member.points
          );

        }else{

          alert("Wrong password");

        }

      }else{

        alert("Member not found");

      }

    }

  </script>

</body>
</html>
