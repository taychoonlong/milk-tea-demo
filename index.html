<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milk Tea Demo</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    .container{
      max-width:400px;
      margin:50px auto;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#ff9800;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:gray;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#ff9800;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-bottom:10px;
    }

    button:hover{
      background:#e68900;
    }

    .register{
      background:#4caf50;
    }

    .register:hover{
      background:#3d9442;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Milk Tea Demo</h1>

    <p>Wonderful Pineapple Point System</p>

    <input type="email" id="loginEmail" placeholder="Email">

    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="login()">Login</button>

    <button class="register" onclick="registerMember()">Register Member</button>

  </div>

  <script>
    function registerMember(){

      let name = prompt("Enter Your Name");
      let phone = prompt("Enter Your Phone Number");
      let email = prompt("Enter Your Email");
      let password = prompt("Create Password");

      if(!name || !phone || !email || !password){
        alert("Please fill all information");
        return;
      }

      let member = {
        name: name,
        phone: phone,
        email: email,
        password: password,
        points: 0
      };

      localStorage.setItem(email, JSON.stringify(member));

      alert("Member Registered Successfully!");
    }

    function login(){

      let email = document.getElementById("loginEmail").value;
      let password = document.getElementById("loginPassword").value;

      let data = localStorage.getItem(email);

      if(!data){
        alert("Member not found. Please register first.");
        return;
      }

      let member = JSON.parse(data);

      if(member.password !== password){
        alert("Wrong password");
        return;
      }

      alert("Login Successful! Welcome " + member.name + ". Your points: " + member.points);
    }
  </script>

</body>
</html>
