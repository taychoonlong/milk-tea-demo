<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milk Tea Demo</title>

  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5;}
    .container{max-width:480px;margin:25px auto;background:white;padding:22px;border-radius:20px;box-shadow:0 0 15px rgba(0,0,0,.1);}
    h1,h2{text-align:center;color:#ff9800;}
    p{text-align:center;color:gray;}
    input,select{width:100%;padding:14px;margin-bottom:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;box-sizing:border-box;}
    button{width:100%;padding:14px;border:none;border-radius:10px;background:#ff9800;color:white;font-size:16px;margin-bottom:10px;cursor:pointer;}
    .register{background:#4caf50}.staff{background:#2196f3}.boss{background:#9c27b0}.logout{background:#777}.danger{background:#e53935}.wa{background:#25D366}
    .hidden{display:none}
    .card{background:#fff7e6;padding:18px;border-radius:18px;text-align:center;margin:15px 0;}
    .points{font-size:44px;font-weight:bold;color:#ff9800;}
    .small{font-size:13px;color:#666;line-height:1.5;}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:15px;}
    th,td{border:1px solid #ddd;padding:7px;text-align:left;}
    th{background:#fff3d8;}
  </style>
</head>

<body>

<div class="container" id="loginPage">
  <h1>Milk Tea Demo</h1>
  <p>Wonderful Pineapple Point System</p>

  <input type="text" id="loginPhone" placeholder="Customer Phone: 0123456789">
  <input type="password" id="loginPassword" placeholder="Customer Password">

  <button onclick="login()">Customer Login</button>
  <button class="register" onclick="registerMember()">Register Member</button>
  <button class="staff" onclick="showStaffLogin()">Staff Panel</button>
  <button class="boss" onclick="showBossLogin()">Boss Panel</button>
</div>

<div class="container hidden" id="dashboardPage">
  <h1>Member Dashboard</h1>
  <p id="welcomeText"></p>

  <div class="card">
    <p>Current Points</p>
    <div class="points" id="pointsText">0</div>
  </div>

  <p class="small" id="memberInfo"></p>
  <button class="wa" id="memberWhatsappBtn">Open WhatsApp</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container hidden" id="staffLoginPage">
  <h2>Staff Login</h2>
  <input type="password" id="staffPassword" placeholder="Staff Password">
  <button class="staff" onclick="staffLogin()">Login Staff</button>
  <button class="logout" onclick="backToLogin()">Back</button>
</div>

<div class="container hidden" id="staffPage">
  <h2>Staff Points Panel</h2>
  <p>RM1 = 1 Point</p>

  <input type="text" id="customerPhone" placeholder="Customer Phone">
  <select id="staffAction">
    <option value="add">Add Points / 加分</option>
    <option value="deduct">Redeem Points / 兑换扣分</option>
  </select>
  <input type="number" id="pointAmount" placeholder="Amount / Points">

  <button class="staff" onclick="processPoints()">Submit</button>

  <div class="card hidden" id="staffResult">
    <p id="staffCustomerName"></p>
    <div class="points" id="staffCustomerPoints">0</div>
    <p>Total Points</p>
  </div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container hidden" id="bossLoginPage">
  <h2>Boss Login</h2>
  <input type="password" id="bossPassword" placeholder="Boss Password">
  <button class="boss" onclick="bossLogin()">Login Boss</button>
  <button class="logout" onclick="backToLogin()">Back</button>
</div>

<div class="container hidden" id="bossPage">
  <h2>Boss Dashboard</h2>

  <button class="boss" onclick="loadAllMembers()">Refresh Customer List</button>
  <button class="register" onclick="downloadCSV()">Download Customer CSV</button>

  <input type="text" id="bossCustomerPhone" placeholder="Customer Phone">
  <input type="number" id="bossNewPoints" placeholder="Set New Points">
  <button class="boss" onclick="setPoints()">Update Points</button>

  <div id="customerTable"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, doc, setDoc, getDoc, updateDoc,
    collection, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDmjVKWl__VmXM5b8daTlyq3sUMAQqSQV0",
    authDomain: "milk-tea-demo.firebaseapp.com",
    projectId: "milk-tea-demo",
    storageBucket: "milk-tea-demo.firebasestorage.app",
    messagingSenderId: "501059382083",
    appId: "1:501059382083:web:b0742f7502b40de2485df6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let allMembers = [];

  function normalizePhone(phone){
    phone = String(phone).replace(/\D/g,"");
    if(phone.startsWith("0")){
      phone = "6" + phone;
    }
    if(!phone.startsWith("60")){
      phone = "60" + phone;
    }
    return phone;
  }

  function whatsappLink(phone){
    return "https://wa.me/" + normalizePhone(phone);
  }

  function hideAll(){
    ["loginPage","dashboardPage","staffLoginPage","staffPage","bossLoginPage","bossPage"]
    .forEach(id => document.getElementById(id).classList.add("hidden"));
  }

  window.backToLogin = function(){
    hideAll();
    document.getElementById("loginPage").classList.remove("hidden");
  }

  window.logout = function(){
    hideAll();
    document.getElementById("loginPage").classList.remove("hidden");
  }

  window.registerMember = async function(){
    let name = prompt("Enter Customer Name");
    let phone = prompt("Enter Phone Number");
    let email = prompt("Enter Email");
    let password = prompt("Create Password");

    if(!name || !phone || !email || !password){
      alert("Please fill all information");
      return;
    }

    phone = normalizePhone(phone);

    await setDoc(doc(db, "members", phone), {
      name:name,
      phone:phone,
      email:email,
      password:password,
      points:0,
      whatsapp:whatsappLink(phone),
      memberId:"MTD-" + Date.now(),
      createdAt:new Date().toLocaleString()
    });

    alert("Member Registered Successfully!");
  }

  window.login = async function(){
    let phone = normalizePhone(document.getElementById("loginPhone").value);
    let password = document.getElementById("loginPassword").value;

    const docRef = doc(db, "members", phone);
    const docSnap = await getDoc(docRef);

    if(!docSnap.exists()){
      alert("Member not found");
      return;
    }

    let member = docSnap.data();

    if(member.password !== password){
      alert("Wrong password");
      return;
    }

    hideAll();
    document.getElementById("dashboardPage").classList.remove("hidden");

    document.getElementById("welcomeText").innerText = "Welcome, " + member.name;
    document.getElementById("pointsText").innerText = member.points;
    document.getElementById("memberInfo").innerText =
      "Phone: " + member.phone +
      "\nEmail: " + member.email +
      "\nMember ID: " + member.memberId;

    document.getElementById("memberWhatsappBtn").onclick = function(){
      window.open(whatsappLink(member.phone), "_blank");
    }
  }

  window.showStaffLogin = function(){
    hideAll();
    document.getElementById("staffLoginPage").classList.remove("hidden");
  }

  window.staffLogin = function(){
    if(document.getElementById("staffPassword").value === "staff123"){
      hideAll();
      document.getElementById("staffPage").classList.remove("hidden");
    }else{
      alert("Wrong staff password");
    }
  }

  window.processPoints = async function(){
    let phone = normalizePhone(document.getElementById("customerPhone").value);
    let action = document.getElementById("staffAction").value;
    let amount = Number(document.getElementById("pointAmount").value);

    if(!phone || !amount){
      alert("Please enter phone and amount");
      return;
    }

    const docRef = doc(db, "members", phone);
    const docSnap = await getDoc(docRef);

    if(!docSnap.exists()){
      alert("Customer not found");
      return;
    }

    let member = docSnap.data();
    let currentPoints = Number(member.points || 0);
    let newPoints = currentPoints;

    if(action === "add"){
      newPoints = currentPoints + Math.floor(amount);
    }else{
      if(currentPoints < amount){
        alert("Not enough points");
        return;
      }
      newPoints = currentPoints - Math.floor(amount);
    }

    await updateDoc(docRef, { points:newPoints });

    document.getElementById("staffResult").classList.remove("hidden");
    document.getElementById("staffCustomerName").innerText =
      member.name + (action === "add" ? " +" : " -") + Math.floor(amount) + " points";
    document.getElementById("staffCustomerPoints").innerText = newPoints;

    alert("Updated successfully!");
  }

  window.showBossLogin = function(){
    hideAll();
    document.getElementById("bossLoginPage").classList.remove("hidden");
  }

  window.bossLogin = async function(){
    if(document.getElementById("bossPassword").value === "boss123"){
      hideAll();
      document.getElementById("bossPage").classList.remove("hidden");
      await loadAllMembers();
    }else{
      alert("Wrong boss password");
    }
  }

  window.setPoints = async function(){
    let phone = normalizePhone(document.getElementById("bossCustomerPhone").value);
    let newPoints = Number(document.getElementById("bossNewPoints").value);

    if(!phone || isNaN(newPoints)){
      alert("Please enter phone and points");
      return;
    }

    const docRef = doc(db, "members", phone);
    const docSnap = await getDoc(docRef);

    if(!docSnap.exists()){
      alert("Customer not found");
      return;
    }

    await updateDoc(docRef, { points:newPoints });
    alert("Points updated successfully!");
    loadAllMembers();
  }

  window.loadAllMembers = async function(){
    const querySnapshot = await getDocs(collection(db, "members"));
    allMembers = [];

    querySnapshot.forEach((docItem) => {
      allMembers.push(docItem.data());
    });

    let html = `
      <table>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Points</th>
          <th>WhatsApp</th>
        </tr>
    `;

    allMembers.forEach(m => {
      html += `
        <tr>
          <td>${m.name || ""}</td>
          <td>${m.phone || ""}</td>
          <td>${m.points || 0}</td>
          <td><button class="wa" onclick="openWA('${m.phone}')">WA</button></td>
        </tr>
      `;
    });

    html += "</table>";
    document.getElementById("customerTable").innerHTML = html;
  }

  window.openWA = function(phone){
    window.open(whatsappLink(phone), "_blank");
  }

  window.downloadCSV = function(){
    if(allMembers.length === 0){
      alert("Please refresh customer list first");
      return;
    }

    let csv = "Name,Phone,Email,Points,Member ID,WhatsApp\n";

    allMembers.forEach(m => {
      csv += `"${m.name || ""}","${m.phone || ""}","${m.email || ""}","${m.points || 0}","${m.memberId || ""}","${whatsappLink(m.phone)}"\n`;
    });

    let blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "milk-tea-demo-customers.csv";
    link.click();
  }
</script>

</body>
</html>
