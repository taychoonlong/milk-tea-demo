<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milk Tea Demo</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    .container{
      max-width:420px;
      margin:40px auto;
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#ff9800;
      margin-bottom:8px;
    }

    p{
      text-align:center;
      color:gray;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#ff9800;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-bottom:10px;
    }

    .register{ background:#4caf50; }
    .logout{ background:#777; }
    .card{
      background:#fff7e6;
      padding:20px;
      border-radius:18px;
      text-align:center;
      margin:20px 0;
    }

    .points{
      font-size:48px;
      font-weight:bold;
      color:#ff9800;
    }

    .hidden{
      display:none;
    }
  </style>
</head>

<body>

  <div class="container" id="loginPage">
    <h1>Milk Tea Demo</h1>
    <p>Wonderful Pineapple Point System</p>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="register" onclick="registerMember()">Register Member</button>
  </div>

  <div class="container hidden" id="dashboardPage">
    <h1>Member Dashboard</h1>
    <p id="welcomeText"></p>

    <div class="card">
      <p>Current Points</p>
      <div class="points" id="pointsText">0</div>
    </div>

    <p id="memberInfo"></p>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmjVKWl__VmXM5b8daTlyq3sUMAQqSQV0",
      authDomain: "milk-tea-demo.firebaseapp.com",
      projectId: "milk-tea-demo",
      storageBucket: "milk-tea-demo.firebasestorage.app",
      messagingSenderId: "501059382083",
      appId: "1:501059382083:web:b0742f7502b40de2485df6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.registerMember = async function(){
      let name = prompt("Enter Your Name");
      let phone = prompt("Enter Your Phone Number");
      let email = prompt("Enter Your Email");
      let password = prompt("Create Password");

      if(!name || !phone || !email || !password){
        alert("Please fill all information");
        return;
      }

      await setDoc(doc(db, "members", email), {
        name:name,
        phone:phone,
        email:email,
        password:password,
        points:0,
        memberId:"MTD-" + Date.now()
      });

      alert("Member Registered Successfully!");
    }

    window.login = async function(){
      let email = document.getElementById("loginEmail").value;
      let password = document.getElementById("loginPassword").value;

      const docRef = doc(db, "members", email);
      const docSnap = await getDoc(docRef);

      if(!docSnap.exists()){
        alert("Member not found");
        return;
      }

      let member = docSnap.data();

      if(member.password !== password){
        alert("Wrong password");
        return;
      }

      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("dashboardPage").classList.remove("hidden");

      document.getElementById("welcomeText").innerText = "Welcome, " + member.name;
      document.getElementById("pointsText").innerText = member.points;
      document.getElementById("memberInfo").innerText =
        "Phone: " + member.phone + "\nEmail: " + member.email + "\nMember ID: " + member.memberId;
    }

    window.logout = function(){
      document.getElementById("dashboardPage").classList.add("hidden");
      document.getElementById("loginPage").classList.remove("hidden");
    }
  </script>

</body>
</html>
